services:
  # AI Monitoring Backend Service
  - type: web
    name: pepsi-ai-monitoring
    env: python
    plan: free
    buildCommand: pip install -r ai_monitoring_requirements.txt
    startCommand: python ai_monitoring_main.py
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
    
    # Auto-deploy from main branch
    repo: https://github.com/shaleengorakatar/MSAI_PepsiCo_demo.git
    branch: main
    rootDir: ./
    
    # Health check configuration
    healthCheck:
      path: /health
      timeoutSeconds: 10
      intervalSeconds: 30
      gracePeriodSeconds: 60

  # Optional: Add a PostgreSQL database if needed for persistence
  # - type: pserv
  #   name: ai-monitoring-db
  #   plan: free
  #   ipAllowList: []
