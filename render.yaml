services:
  - type: web
    name: msai-pepsico-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://localhost:5173,https://*.lovable.app
      - key: DATABASE_URL
        fromDatabase:
          name: pepsico-assessment-db
          property: connectionString

databases:
  - name: pepsico-assessment-db
    plan: free
    databaseName: pepsico_control_assessment
